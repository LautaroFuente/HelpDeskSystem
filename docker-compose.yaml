version: "3.9"

services:
  backend:
    image: mesadeayuda-backend:1.0
    container_name: mesadeayuda-api
    ports:
      - "5000:80"
    depends_on:
      - postgresdb

  frontend:
    image: mesadeayuda-frontend:1.0
    container_name: mesadeayuda-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
  postgresdb:
    image: postgres:15
    container_name: postgresdb
    restart: always
    environment:
      POSTGRES_DB: mesadeayuda
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
